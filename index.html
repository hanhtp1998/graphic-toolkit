<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRAPHIC TOOLKIT</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>

<!-- Header -->
<div class="site-header">
  <div style="display:flex;align-items:center;gap:14px;">
    <img src="/favicon.svg" alt="Graphic Toolkit icon" class="header-app-icon">
    <div>
      <div class="logo">TOOLKIT</div>
      <div class="tagline" style="margin-top:4px;">GRAPHIC TOOLS · HUB</div>
    </div>
  </div>
  <div class="header-dots">
    <span class="dot-r"></span><span class="dot-g"></span><span class="dot-b"></span>
  </div>
</div>

<div class="main">

  <div class="section-eyebrow">AVAILABLE TOOLS</div>
  <div class="section-divider"></div>

  <!-- Tool Card: Pixel Forge -->
  <div class="card" style="cursor: pointer;" onclick="window.location.href='tools/pixel-forge/'">
    <div class="card-header">
      <span class="step-badge">01</span>
      PIXEL FORGE
      <span class="blink">▌</span>
    </div>
    <div class="card-body">
      <p style="font-size: 1rem; color: var(--muted); margin-bottom: 12px;">
        Convert raster images into pixel-art SVG icons. Upload, configure pixel grid, and batch-download multiple sizes.
      </p>
      <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px;">
        <span style="font-size: 0.8rem; background: var(--cream2); border: 2px solid #c8b89a; color: var(--mid); padding: 4px 8px; font-family: 'Press Start 2P';">SVG EXPORT</span>
        <span style="font-size: 0.8rem; background: var(--cream2); border: 2px solid #c8b89a; color: var(--mid); padding: 4px 8px; font-family: 'Press Start 2P';">BATCH PROCESS</span>
        <span style="font-size: 0.8rem; background: var(--cream2); border: 2px solid #c8b89a; color: var(--mid); padding: 4px 8px; font-family: 'Press Start 2P';">CLIENT-SIDE</span>
      </div>
    </div>
  </div>

  <!-- Placeholder for future tools -->
  <div class="card" style="opacity: 0.6;">
    <div class="card-header">
      <span class="step-badge">02</span>
      COMING SOON
    </div>
    <div class="card-body">
      <p style="font-size: 1rem; color: var(--muted);">More tools launching soon...</p>
    </div>
  </div>

</div><!-- /main -->

</body>
</html>
